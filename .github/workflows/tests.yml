name: brew test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tap dependencies
        run: |
          brew tap borkdude/brew
          brew trust borkdude/brew

      - name: Install isaac from tap (stable)
        env:
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: |
          brew untap slagyr/tap 2>/dev/null || true
          brew tap slagyr/tap "${GITHUB_WORKSPACE}"
          brew install slagyr/tap/isaac
          brew test slagyr/tap/isaac

      - name: Install isaac from tap (--HEAD)
        env:
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: |
          brew install --HEAD slagyr/tap/isaac
          brew test slagyr/tap/isaac

      - name: Install and test other formulae
        env:
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: |
          for formula in Formula/*.rb; do
            name="$(basename "${formula}" .rb)"
            if [[ "${name}" == "isaac" ]]; then
              continue
            fi
            brew install slagyr/tap/"${name}"
            brew test slagyr/tap/"${name}"
          done